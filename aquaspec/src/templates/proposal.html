<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    @page { size: A4; margin: 20mm; }
    body { font-family: 'Helvetica Neue', Arial, sans-serif; color: #1a1a1a; line-height: 1.6; }
    .header { text-align: center; padding-bottom: 20px; border-bottom: 3px solid {{PRIMARY_COLOR}}; }
    .header img { max-width: 200px; height: auto; }
    .header h1 { color: {{PRIMARY_COLOR}}; font-size: 24pt; margin: 8px 0 0; }
    .header .subtitle { font-size: 10pt; color: #666; }
    .section-title { color: {{PRIMARY_COLOR}}; font-size: 14pt; border-bottom: 1px solid {{PRIMARY_COLOR}}; padding-bottom: 4px; margin: 24px 0 12px; }
    .system-block { margin-bottom: 20px; }
    .system-block h3 { font-size: 12pt; color: {{PRIMARY_COLOR}}; margin-bottom: 6px; }
    table { width: 100%; border-collapse: collapse; font-size: 9pt; }
    table th { background: {{PRIMARY_COLOR}}; color: white; padding: 6px 8px; text-align: left; }
    table td { padding: 4px 8px; border-bottom: 1px solid #e5e5e5; }
    table tr:nth-child(even) td { background: #f9f9f9; }
    .footer { margin-top: 40px; padding-top: 12px; border-top: 1px solid #ccc; font-size: 8pt; color: #999; text-align: center; }
    .budgetary { background: #f0f5ff; border: 1px solid {{PRIMARY_COLOR}}; padding: 12px 16px; margin-top: 24px; font-size: 9pt; }
    .budgetary h3 { color: {{PRIMARY_COLOR}}; margin: 0 0 8px; }
    /* page-break before each system in multi-system mode */
    .page-break { page-break-before: always; }
  </style>
</head>
<body>
  <div class="header">
    <img src="{{LOGO_URL}}" alt="Lotus Ozone" />
    <h1>AquaSpec Proposal</h1>
    <div class="subtitle">
      <strong>Hatchery:</strong> {{HATCHERY_NAME}} &nbsp;|&nbsp; <strong>Date:</strong> {{DATE}} &nbsp;|&nbsp; <strong>Mode:</strong> {{MODE_LABEL}}
    </div>
  </div>

  {{SYSTEMS_HTML}}

  {{AGGREGATE_HTML}}

  {{BUDGETARY_HTML}}

  <div class="footer">{{FOOTER_TEXT}}</div>
</body>
</html>
